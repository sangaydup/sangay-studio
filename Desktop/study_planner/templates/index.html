<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study Planner Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body class="bg-slate-900 text-white flex">

<!-- SIDEBAR -->
<div class="w-64 h-screen bg-slate-800 p-5 hidden md:block">
    <h2 class="text-2xl font-bold mb-10">📚 Planner</h2>

    <ul class="space-y-4">
        <li class="text-blue-400">Dashboard</li>
        <li class="text-gray-400">Tasks</li>
        <li class="text-gray-400">Settings</li>
    </ul>
</div>

<!-- MAIN CONTENT -->
<div class="flex-1 p-6">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-semibold">Dashboard</h1>
        <span class="text-gray-400">Stay productive ⚡</span>
    </div>

    <!-- STATS -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">

        <div data-aos="fade-up"
             class="bg-white/10 p-5 rounded-xl">
            <p class="text-gray-400">Total Tasks</p>
            <h2 class="text-2xl font-bold">{{ total }}</h2>
        </div>

        <div data-aos="fade-up"
             class="bg-white/10 p-5 rounded-xl">
            <p class="text-gray-400">Completed</p>
            <h2 class="text-2xl font-bold text-green-400">{{ completed }}</h2>
        </div>

        <div data-aos="fade-up"
             class="bg-white/10 p-5 rounded-xl">
            <p class="text-gray-400">Pending</p>
            <h2 class="text-2xl font-bold text-yellow-400">{{ pending }}</h2>
        </div>

    </div>

    <!-- TASK FORM -->
    <form action="/add" method="POST"
          class="bg-white/10 p-4 rounded-xl flex flex-wrap gap-3 mb-6">

        <input type="text" name="content" placeholder="New task..."
               class="flex-1 px-3 py-2 rounded bg-white/20">

        <input type="date" name="deadline"
               class="px-3 py-2 rounded bg-white/20">

        <select name="priority"
                class="px-3 py-2 rounded bg-white/20">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
        </select>

        <button class="bg-blue-500 px-4 py-2 rounded hover:bg-blue-600">
            Add
        </button>
    </form>

    <!-- TASK LIST -->
    <div class="space-y-4">
        {% for task in tasks %}
        <div data-aos="fade-up"
             class="bg-white/10 p-4 rounded-xl flex justify-between items-center">

            <div class="flex items-center gap-3">

                <a href="/toggle/{{ task['id'] }}"
                   class="w-6 h-6 border rounded-full
                   {% if task['completed'] %}
                       bg-green-500
                   {% endif %}">
                </a>

                <div>
                    <p class="{% if task['completed'] %}line-through text-gray-400{% endif %}">
                        {{ task['content'] }}
                    </p>

                    <small class="text-gray-400">
                        {{ task['deadline'] }} | {{ task['priority'] }}
                    </small>
                </div>
            </div>

            <a href="/delete/{{ task['id'] }}" class="text-red-400">✕</a>

        </div>
        {% endfor %}
    </div>

</div>

<script>
AOS.init();
</script>

</body>
</html>
